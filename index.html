<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Rush Drive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }

        /* ── HUD ── */
        #hud {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.45);
            border-radius: 12px;
            padding: 8px 18px;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 16px;
            white-space: nowrap;
        }
        #coinLabel { font-weight: bold; letter-spacing: 0.5px; }
        #coinCount { color: #ffd700; font-weight: bold; min-width: 24px; text-align: left; }
        .hud-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.25); }
        .hud-btn {
            padding: 5px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 7px;
            background: #fff;
            color: #222;
            transition: background 0.15s;
        }
        .hud-btn:hover { background: #ddd; }

        /* ── START OVERLAY ── */
        #startOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #020c1b 0%, #031a35 60%, #042a50 100%);
            z-index: 20;
            color: #fff;
            font-family: Arial, sans-serif;
            gap: 14px;
            padding: 24px 16px;
            overflow-y: auto;
        }
        #gameLogo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px #00e5ff);
        }
        #gameTitle {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #00e5ff;
            text-shadow:
                0 0 10px #00e5ff,
                0 0 30px #00e5ff,
                0 0 60px #0088ff;
            text-align: center;
        }
        #gameSubtitle {
            font-size: 14px;
            color: #a0c8e0;
            text-align: center;
            line-height: 1.8;
        }

        /* Desktop: center & wrap */
        #infoCards {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            padding: 0 16px;
        }
        .info-card {
            background: rgba(0, 180, 255, 0.07);
            border: 1px solid rgba(0, 200, 255, 0.25);
            border-radius: 12px;
            padding: 16px 20px;
            width: 150px;
            text-align: center;
            color: #cce8ff;
            font-size: 13px;
            line-height: 1.6;
        }
        .info-icon { font-size: 26px; display: block; margin-bottom: 8px; }
        #startBtn {
            margin-top: 8px;
            padding: 14px 48px;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px #00aaff88, 0 0 40px #0055ff44;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ccffaa, 0 0 60px #0077ff66;
        }

        /* ── PAUSE OVERLAY ── */
        #pauseOverlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.55);
            z-index: 20;
            color: #fff;
            font-family: Arial, sans-serif;
            gap: 20px;
        }
        #pauseOverlay h2 { font-size: 40px; }
        #pauseOverlay button {
            padding: 10px 32px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #222;
            cursor: pointer;
        }
        #pauseOverlay button:hover { background: #ddd; }

        /* ── MOBILE CONTROLS ── */
        #mobileControls {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 10;
        }
        .arrow-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .arrow-btn:active { background: rgba(255,255,255,0.35); }

        /* ── RESPONSIVE MOBILE ── */
        @media (max-width: 480px) {
            #gameLogo {
                width: 110px;
                height: 110px;
            }
            #gameTitle {
                font-size: 32px;
                letter-spacing: 2px;
            }
            #gameSubtitle {
                font-size: 13px;
            }
            /* Mobile: scroll horizontal, jangan wrap */
            #infoCards {
                flex-wrap: nowrap;
                overflow-x: auto;
                justify-content: flex-start;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            #infoCards::-webkit-scrollbar { display: none; }
            .info-card {
                min-width: 130px;
                width: 130px;
                flex-shrink: 0;
                font-size: 12px;
                padding: 12px 14px;
            }
            #startBtn {
                padding: 12px 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- START OVERLAY -->
<div id="startOverlay">
    <img src="logogame.avif" alt="Logo" id="gameLogo">
    <h1 id="gameTitle">COIN RUSH DRIVE</h1>
    <p id="gameSubtitle">
        Kumpulkan koin sebanyak mungkin!<br>
        Hindari barrikade atau game berakhir!
    </p>
    <div id="infoCards">
        <div class="info-card">
            <span class="info-icon">⌨️</span>
            Gerakkan mobil menggunakan<br><b>WASD atau tombol panah</b>
        </div>
        <div class="info-card">
            <span class="info-icon">📱</span>
            Di mobile gunakan<br><b>tombol ◀ ▶ di layar</b>
        </div>
        <div class="info-card">
            <span class="info-icon">⏸️</span>
            Pause game dengan<br><b>SPACE atau tombol Pause</b>
        </div>
    </div>
    <button id="startBtn">🚗 MULAI MAIN!</button>
</div>

<!-- PAUSE OVERLAY -->
<div id="pauseOverlay">
    <h2>PAUSED</h2>
    <button id="resumeBtn">Continue</button>
</div>

<!-- HUD -->
<div id="hud">
    <span id="coinLabel">🪙 Coin Collected :</span>
    <span id="coinCount">0</span>
    <div class="hud-divider"></div>
    <button class="hud-btn" id="pauseBtn">⏸ Pause</button>
    <button class="hud-btn" id="restartBtn">🔄 Restart</button>
</div>

<!-- MOBILE ARROW BUTTONS -->
<div id="mobileControls">
    <button class="arrow-btn" id="leftBtn">◀</button>
    <button class="arrow-btn" id="rightBtn">▶</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
    }
}
</script>

<script type="module" src="main.js"></script>

</body>
</html>
